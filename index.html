<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senior Course Consultant Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-blue-800">Course Consultant Assistant</h1>
            <p class="text-gray-600">เครื่องมือช่วยจัด Roadmap สำหรับพี่วิน</p>
        </header>

        <!-- Config Section: ปรับแต่ง Prompt ได้ -->
        <div class="bg-white p-4 rounded-xl shadow-sm mb-6 border-l-4 border-yellow-400">
            <details>
                <summary class="cursor-pointer font-medium text-gray-700">⚙️ ตั้งค่า System Prompt (ปรับแต่งบทบาทและ Workflow ได้)</summary>
                <div class="mt-4">
                    <textarea id="systemPrompt" rows="10" class="w-full p-3 text-sm border rounded-lg bg-gray-50">
# Role
คุณคือ Senior Course Consultant ผู้เชี่ยวชาญด้านการจัด Roadmap การเรียนแบบ Personalized โดยใช้สไตล์การสื่อสารแบบ "พี่สอนน้อง" (เป็นกันเอง สุภาพ และจริงใจ)

# Objective
หน้าที่ของคุณคือรับข้อมูล "Requirement จากลูกค้า" ที่ระบุไว้ด้านล่าง แล้วดำเนินการตามขั้นตอนดังนี้:

# Workflow (ต้องทำตามลำดับ)
1. **Analyze:** วิเคราะห์ความต้องการของลูกค้า สรุปว่าเป้าหมายหลัก (Goal) คืออะไร และเขามีข้อจำกัดหรือพื้นฐานอย่างไร
2. **Initial Solutions:** นำเสนอคอร์สเรียนที่เกี่ยวข้อง (แนะนำ 2-3 คอร์ส) พร้อมบอกเหตุผลว่า "ทำไมคอร์สนี้ถึงตอบโจทย์ Requirement นี้"
3. **Deep-Dive Questions:** เสนอชุดคำถาม 3-5 ข้อ เพื่อให้ผม (Consultant) นำไปถามลูกค้าต่อ เพื่อให้ได้ข้อมูลที่นิ่งขึ้น และระบุคอร์สได้แม่นยำกว่าเดิม (เน้นถามเรื่อง: เวลาเรียน, งบประมาณ, พื้นฐานเชิงลึก, และเป้าหมายหลังเรียนจบ)

# Formatting
- ใช้ภาษาไทยที่เป็นกันเอง (แทนตัวเองว่า พี่/ทีมงาน)
- ใช้ Markdown (Bold, Bullet Points) เพื่อให้สรุปข้อมูลได้ชัดเจนและ Copy ไปส่งต่อให้ลูกค้าได้ง่าย</textarea>
                </div>
            </details>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 text-gray-800">
            
            <!-- Left Side: Input -->
            <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-200">
                <h2 class="text-xl font-semibold mb-4 flex items-center">
                    <span class="mr-2">📝</span> Customer Requirement
                </h2>
                <textarea id="customerReq" class="w-full h-[400px] p-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="เอาข้อความที่คุยกับลูกค้ามาแปะตรงนี้..."></textarea>
                <button onclick="generatePrompt()" class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg active:scale-95">
                    ✨ Generate Prompt
                </button>
            </div>

            <!-- Right Side: Result -->
            <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-200 flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold flex items-center">
                        <span class="mr-2">🚀</span> Final Prompt
                    </h2>
                    <button onclick="copyToClipboard()" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition-all flex items-center">
                        <span id="copyText">📋 Copy ทั้งหมด</span>
                    </button>
                </div>
                <div id="outputContainer" class="flex-grow p-4 bg-gray-50 border border-dashed border-gray-300 rounded-xl overflow-auto whitespace-pre-wrap text-sm leading-relaxed text-gray-700">
                    ผลลัพธ์จะปรากฏที่นี่...
                </div>
            </div>

        </div>
    </div>

    <script>
        function generatePrompt() {
            const system = document.getElementById('systemPrompt').value;
            const customer = document.getElementById('customerReq').value;
            
            if (!customer.trim()) {
                alert('พี่วินลืมใส่ข้อมูลลูกค้าครับ!');
                return;
            }

            const finalPrompt = `${system}\n\n---\n# CUSTOMER REQUIREMENT (ข้อมูลลูกค้า):\n${customer}\n---`;
            
            document.getElementById('outputContainer').innerText = finalPrompt;
        }

        function copyToClipboard() {
            const text = document.getElementById('outputContainer').innerText;
            if (text === 'ผลลัพธ์จะปรากฏที่นี่...') return;

            navigator.clipboard.writeText(text).then(() => {
                const btnText = document.getElementById('copyText');
                btnText.innerText = '✅ คัดลอกแล้ว!';
                setTimeout(() => {
                    btnText.innerText = '📋 Copy ทั้งหมด';
                }, 2000);
            });
        }
    </script>
</body>
</html>
