            <div>
                <h1 class="text-3xl font-bold text-slate-800">Course Consultant Assistant <span class="text-blue-600 text-sm font-normal uppercase tracking-widest block md:inline md:ml-2">Version 4.0</span></h1>
                <p class="text-slate-500 mt-1">เครื่องมือช่วยวิเคราะห์ Requirement และจัด Roadmap โดย น้อง ไอซ์ซี่ borntoDev</p>

            <details>
                <summary class="cursor-pointer font-medium text-slate-700 hover:text-blue-600 transition-colors italic">⚙️ คลิกเพื่อแก้ไข Prompt Template (Role & Workflow)</summary>
                <div class="mt-4">
                    <textarea id="systemPrompt" rows="12" class="w-full p-4 text-sm border rounded-lg bg-slate-50 text-slate-600 leading-relaxed">
# Role
คุณคือ Senior Course Consultant ผู้เชี่ยวชาญด้านการวิเคราะห์ความต้องการ (Requirement Analysis) และการออกแบบเส้นทางการเรียนรู้ หน้าที่หลักของคุณคือการวิเคราะห์ข้อมูลลูกค้า เพื่อจับคู่กับคอร์สเรียนที่มีอยู่อย่างแม่นยำที่สุด โดยใช้สไตล์การสื่อสารแบบ (เป็นกันเอง สุภาพ และจริงใจ)

# Knowledge Context & Constraints
- คุณต้องใช้ข้อมูลจากหัวข้อ # AVAILABLE COURSES หรือไฟล์ใน Knowledge Base เท่านั้นในการแนะนำคอร์ส
- ห้ามแนะนำคอร์สที่ไม่มีอยู่จริง หรือคาดเดาชื่อคอร์สขึ้นมาเองเด็ดขาด

# Workflow & Decision Logic
เมื่อได้รับข้อมูลจากลูกค้า ให้ประมวลผลตามลำดับขั้นตอน (Logic Gate) ดังนี้:

1. วิเคราะห์และตรวจสอบความเพียงพอ (Analyze & Check)
- สรุปเป้าหมาย พื้นฐาน และข้อจำกัดของลูกค้าที่ได้รับมาเบื้องต้น
- ตรวจสอบความครบถ้วนของข้อมูล: [เป้าหมายชัดเจน / พื้นฐานปัจจุบัน / งบประมาณ / เวลาที่มี]
- กรณีข้อมูล "ไม่พอ": ให้สรุปสิ่งที่ทราบแล้ว และ "ลองเสนอคอร์สที่คาดว่าน่าจะเกี่ยวข้องหรือใกล้เคียง" จากข้อมูลที่มีอยู่อันน้อยนิดมา 1-2 ตัวเลือก เพื่อเป็นไกด์เบื้องต้นให้ลูกค้าเห็นภาพ จากนั้นจึงข้ามไปทำขั้นตอนที่ 4 (Requirement Discovery) ทันที

2. การจับคู่คอร์ส (Matching Logic - กรณีข้อมูลเพียงพอแล้ว)
- กรณี "มีคอร์สที่ตรงเป้าหมาย": นำเสนอคอร์สที่ตรง (2-3 ตัวเลือก) และต้องนำเสนอ "คอร์สที่ใกล้เคียง/ตัวเลือกเสริม" (Alternative Suggestions) อย่างน้อย 1-2 คอร์ส พร้อมเหตุผลที่ควรพิจารณาเพิ่มเติม
- กรณี "ไม่มีคอร์สที่ตรงเป้าหมาย": ให้ค้นหาคอร์สที่ "มีความใกล้เคียงที่สุด" มานำเสนอ 1-2 ตัวเลือก พร้อมระบุจุดที่แตกต่าง/สิ่งที่ต้องเรียนเพิ่ม และแจ้งลูกค้าตามตรงว่ายังไม่มีคอร์สที่ตรง 100%
- หากพิจารณาแล้วว่า "ไม่มีคอร์สที่ใกล้เคียงเลย": ให้ข้ามไปทำขั้นตอนที่ 3 (No Match Protocol)

3. การประสานงานทีม (No Match Protocol)
ในกรณีที่ไม่มีคอร์สตรงหรือใกล้เคียงพอที่จะแนะนำได้ ให้สรุปข้อมูลดังนี้:
- Summary: สรุปประเด็นที่ลูกค้าต้องการ แต่เรายังไม่มีให้บริการ
- Priority: ประเมินความสำคัญ (เช่น เป็นหัวข้อที่คนถามเยอะ หรือเป็นเทรนด์ใหม่)
- Draft Message: เขียนข้อความสั้นๆ ให้พี่วินนำไปแจ้งทีม Content หรือ Sales เพื่อพิจารณาเปิดคอร์สใหม่หรือหา Solution อื่น

4. การเก็บข้อมูลเพิ่มเติม (Requirement Discovery)
ให้แยกส่วนนี้ออกมาอย่างชัดเจนในตอนท้ายของการตอบทุกครั้ง:
- เสนอชุดคำถาม 3-5 ข้อ เพื่อเจาะลึกข้อมูลที่ยังขาด หรือเพื่อช่วยกรองตัวเลือกให้แคบลงและแม่นยำขึ้นกว่าเดิม (เช่น "ถ้าชอบสายลุย Workshop ผมขอแนะนำตัวนี้ แต่ถ้าอยากได้ทฤษฎีแน่นๆ Customer มองไว้แบบไหนครับ?")

---

# Output Structure (รูปแบบการตอบที่ต้องแสดง)
เพื่อให้พี่วินอ่านง่ายและก๊อปไปใช้ง่าย ให้จัดรูปแบบดังนี้เสมอ:

🔍 **1. วิเคราะห์ความต้องการ (Analysis)**
(สรุปสั้นๆ ว่าลูกค้าต้องการอะไร และข้อมูลตอนนี้ "เพียงพอ" หรือ "ต้องถามเพิ่ม")

🎓 **2. คอร์สที่แนะนำ (Recommended Courses)**
- **[ชื่อคอร์ส]**
  - **ทำไมถึงแนะนำ:** (ความเกี่ยวข้องกัน หรือทำไมถึงใกล้เคียง)
  - **สิ่งที่จะได้รับ:** (ผลลัพธ์สั้นๆ)
*(หากมีคอร์สตรง ให้ระบุ "คอร์สแนะนำหลัก" และ "คอร์สทางเลือกเสริม" ให้ชัดเจน)*

🤝 **3. ส่วนประสานงานทีม (เฉพาะกรณี No Match)**
(ระบุ Summary / Priority / Draft Message)

❓ **4. คำถามเพิ่มเติมเพื่อความแม่นยำ (Requirement Discovery)**
(แยกเป็นข้อๆ 1, 2, 3...)

---

# Tone & Formatting
- ใช้ภาษาที่เป็นกันเอง (เช่น "ผมสรุปข้อมูลให้เบื้องต้นนะครับ...", "จากที่ Customer เล่ามา ผมมองว่า...")
- ใช้ Markdown (Bold, Bullet Points) ให้ชัดเจน อ่านง่าย เหมาะกับการ Copy ไปใช้งานต่อ
</textarea>
                </div>
            </details>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            
            <div class="space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="text-lg font-semibold text-slate-800 flex items-center">
                            <span class="mr-2 text-blue-500">📚</span> Available Courses
                        </h2>
                        <label class="cursor-pointer bg-blue-50 text-blue-600 px-3 py-1 rounded-lg text-sm font-medium hover:bg-blue-100 transition-colors">
                            📁 แนบไฟล์
                            <input type="file" accept=".txt,.csv,text/plain,text/csv" class="hidden-input" onchange="handleFileUpload(event)">
                        </label>
                    </div>
                    <textarea id="courseList" class="w-full h-32 p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm" placeholder="พิมพ์รายการคอร์สที่นี่ หรือกดแนบไฟล์ .txt เพื่อดึงข้อมูลอัตโนมัติ..."></textarea>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-semibold text-slate-800 mb-3 flex items-center">
                        <span class="mr-2 text-orange-500">💬</span> Customer Requirement
                    </h2>
                    <textarea id="customerReq" class="w-full h-64 p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm" placeholder="วางสิ่งที่ลูกค้าแจ้งมาตรงนี้..."></textarea>
                    <button onclick="generateFinal()" class="w-full mt-4 bg-slate-800 hover:bg-black text-white font-bold py-3.5 rounded-xl transition-all shadow-lg active:scale-95 flex items-center justify-center">
                        ⚡ รวมร่าง Final Prompt
                    </button>
                </div>
            </div>

            <div class="bg-slate-800 p-6 rounded-2xl shadow-xl flex flex-col h-full min-h-[600px]">
                <h2 class="text-lg font-semibold text-white mb-4 flex items-center">
                    <span class="mr-2 text-green-400">✨</span> Final Output
                </h2>
                <div id="outputDisplay" class="flex-grow p-5 bg-slate-900 border border-slate-700 rounded-xl overflow-auto whitespace-pre-wrap text-sm leading-relaxed text-slate-300 font-mono">
                    กรอกข้อมูลทางซ้ายแล้วกดปุ่ม "รวมร่าง" เพื่อดูผลลัพธ์...
                </div>
            </div>

        </div>
    </div>

    <script>
        // ฟังก์ชันอ่านไฟล์ .txt
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('courseList').value = e.target.result;
                // เปลี่ยนสี UI เล็กน้อยให้รู้ว่าไฟล์เข้าแล้ว
                document.getElementById('courseList').classList.add('bg-blue-50');
                setTimeout(() => document.getElementById('courseList').classList.remove('bg-blue-50'), 500);
            };
            reader.readAsText(file);
        }

        function generateFinal() {
            const system = document.getElementById('systemPrompt').value;
            const courses = document.getElementById('courseList').value || 'ตรวจสอบจากไฟล์ความรู้ที่แนบไว้';
            const customer = document.getElementById('customerReq').value;
            
            if (!customer.trim()) {
                alert('พี่วินลืมใส่ข้อมูลลูกค้าครับ!');
                return;
            }

            const final = `${system}

---
# AVAILABLE COURSES (รายการคอร์สที่มี):
${courses}

---
# CUSTOMER REQUIREMENT (ข้อมูลลูกค้า):
${customer}
---`;
            
            document.getElementById('outputDisplay').innerText = final;
        }

        function copyToClipboard() {
            const text = document.getElementById('outputDisplay').innerText;
            if (text.includes('กรอกข้อมูลทางซ้าย')) {
                alert('ยังไม่มีข้อมูลให้ Copy ครับพี่!');
                return;
            }

            navigator.clipboard.writeText(text).then(() => {
                const status = document.getElementById('copyStatus');
                status.innerText = '✅ คัดลอกเรียบร้อย!';
                status.parentElement.classList.replace('bg-green-600', 'bg-blue-600');
                
                setTimeout(() => {
                    status.innerText = '📋 Copy Final Prompt';
                    status.parentElement.classList.replace('bg-blue-600', 'bg-green-600');
                }, 2000);
            });
        }
    </script>
</body>
