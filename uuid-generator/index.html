<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>UUID Generator</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-title"></div>
      <ul class="nav-menu">
        <li><a href="../">🏠 Home</a></li>
        <li><a href="../text-scanner/">📄 Text Scanner</a></li>
        <li><a href="../content-formatter/">📋 Content Formatter</a></li>
        <li><a href="../uuid-generator/" class="active">🆔 UUID Generator</a></li>
        <li><a href="../extractor/">📋 Extractor Merger</a></li>
        <li><a href="../emoji-dot/">📋 Emoji & Dot</a></li>
      </ul>
    </aside>

    <button class="toggle-sidebar" onclick="toggleSidebar()">☰</button>

    <div class="main-content">
    <div class="container">
      <h1>UUID Generator</h1>

      <div class="quick-buttons">
        <button onclick="setCount(1)">1</button>
        <button onclick="setCount(10)">10</button>
        <button onclick="setCount(100)">100</button>
        <button onclick="setCount(1000)">1000</button>
      </div>

      <input
        type="number"
        id="count"
        min="1"
        max="1000"
        value="10"
        placeholder="Enter amount"
      />

      <div id="result" class="result-box"></div>

      <div class="buttons">
        <button onclick="generateUUIDs()">Generate</button>

        <button onclick="copyUUIDs()">Copy</button>
      </div>
    </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
