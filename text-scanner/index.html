<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Scanner & Word Counter (Dark Mode)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #121214;
            color: #e2e8f0;
            margin: 0;
            padding: 0;
            display: flex;
        }
        .sidebar {
            width: 250px;
            background: #f8fafc;
            padding: 20px 0;
            border-right: 1px solid #e2e8f0;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            overflow-y: auto;
            transition: transform 0.3s ease;
        }
        .sidebar.closed {
            transform: translateX(-250px);
        }
        .toggle-sidebar {
            position: fixed;
            left: 10px;
            top: 20px;
            z-index: 1000;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            color: #1e293b;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }
        .sidebar.closed ~ .toggle-sidebar {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
        }
        .sidebar-title {
            padding: 20px 20px 30px 20px;
            border-bottom: 2px solid #e2e8f0;
            margin-bottom: 20px;
            color: #1e293b;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .nav-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .nav-menu li {
            margin: 0;
        }
        .nav-menu a {
            display: block;
            padding: 12px 20px;
            color: #475569;
            text-decoration: none;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            font-size: 0.95rem;
        }
        .nav-menu a:hover {
            background-color: #e0e7ff;
            color: #2563eb;
            border-left-color: #2563eb;
            padding-left: 23px;
        }
        .nav-menu a.active {
            background-color: #e0e7ff;
            color: #2563eb;
            border-left-color: #2563eb;
            font-weight: 600;
        }
        .main-content {
            margin-left: 250px;
            flex: 1;
            transition: margin-left 0.3s ease;
        }
        .sidebar.closed ~ .main-content {
            margin-left: 0;
        }
        .main-content {
            margin-left: 250px;
            flex: 1;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #1e1e24;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        h2 {
            margin-top: 0;
            color: #ffffff;
            border-bottom: 2px solid #2d2d34;
            padding-bottom: 10px;
        }
        .stats-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: #2d2d34;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.95rem;
            color: #a0aec0;
            flex: 1;
            border: 1px solid #3f3f46;
        }
        .stat-box span {
            color: #38bdf8;
            font-size: 1.1rem;
            margin-left: 5px;
        }
        .stat-box.match-box {
            border-color: #f59e0b;
        }
        .stat-box.match-box span {
            color: #f59e0b;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #cbd5e1;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            background-color: #2d2d34;
            border: 1px solid #4b5563;
            border-radius: 8px;
            color: #ffffff;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #38bdf8;
        }
        .editor-container {
            position: relative;
            border: 1px solid #4b5563;
            border-radius: 8px;
            background: #252529;
            min-height: 250px;
            font-size: 1.05rem;
            line-height: 1.6;
            overflow: hidden;
        }
        .backdrop {
            position: absolute;
            z-index: 1;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 14px;
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: transparent;
            overflow-y: auto;
            pointer-events: none;
            box-sizing: border-box;
        }
        textarea {
            position: absolute;
            z-index: 2;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            padding: 14px;
            margin: 0;
            border: none;
            border-radius: 8px;
            resize: none;
            background: transparent;
            font-family: inherit;
            font-size: inherit;
            line-height: inherit;
            color: #e2e8f0;
            box-sizing: border-box;
            overflow-y: auto;
            caret-color: #ffffff; /* สีของ Cursor ตอนพิมพ์ */
        }
        textarea:focus {
            outline: none;
        }
        /* สีของ Highlight ปรับเป็นสีส้ม/ทอง เพื่อให้ตัดกับโทนมืดชัดเจน */
        mark {
            background-color: #f59e0b;
            color: transparent;
            border-radius: 3px;
        }
    </style>
</head>
<body>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-title"></div>
    <ul class="nav-menu">
        <li><a href="../">🏠 Home</a></li>
        <li><a href="../text-scanner/" class="active">📄 Text Scanner</a></li>
        <li><a href="../content-formatter/">📋 Content Formatter</a></li>
        <li><a href="../uuid-generator/">🆔 UUID Generator</a></li>
    </ul>
</aside>

<button class="toggle-sidebar" onclick="toggleSidebar()">☰</button>

<div class="main-content">
<div class="container">
    <h2>Text Scanner & Word Counter v.1.0.1</h2>
    
    
    <div class="stats-container">
        <div class="stat-box">จำนวนคำ: <span id="wordCount">0</span></div>
        <div class="stat-box">ตัวอักษรทั้งหมด: <span id="charCount">0</span></div>
        <div class="stat-box match-box">พบคำที่ค้นหา: <span id="matchCount">0</span></div>
    </div>

    <div class="input-group">
        <label for="searchWord">คำที่ต้องการ Highlight (เคาะ Spacebar เพื่อแยกคำ เช่น คุณ ผม ครับ):</label>
        <input type="text" id="searchWord" placeholder="พิมพ์คำที่ต้องการเว้นวรรค เช่น คุณ ผม" value="คุณ ผม ขาด คอนฟิก พิสดาร สกปรก ยัด">
    </div>

    <label>วางข้อความของคุณ:</label>
    <div class="editor-container">
        <div class="backdrop" id="backdrop"></div>
        <textarea id="textInput" placeholder="พิมพ์หรือวางข้อความที่นี่..."></textarea>
    </div>
</div>

<script>
    const textInput = document.getElementById('textInput');
    const backdrop = document.getElementById('backdrop');
    const searchWordInput = document.getElementById('searchWord');
    const wordCountSpan = document.getElementById('wordCount');
    const charCountSpan = document.getElementById('charCount');
    
    const matchCountSpan = document.getElementById('matchCount'); 
    const segmenter = new Intl.Segmenter('th', { granularity: 'word' }); // สำหรับนับคำไทยแท้

    function processText() {
        const text = textInput.value;

        // 1. นับคำ และ ตัวอักษร
        charCountSpan.textContent = text.length;
        
        if (text.trim() === "") {
            wordCountSpan.textContent = "0";
        } else {
            const words = text.trim().split(/\s+/);
            wordCountSpan.textContent = words.length;
        }

        // 2. ทำ Highlight คำที่ต้องการ (เปลี่ยนเป็นแยกด้วย Space)
        const searchInput = searchWordInput.value;
        if (!searchInput.trim() || !text) {
            backdrop.innerHTML = escapeHTML(text);
            return;
        }

        // แยกคำค้นหาด้วยช่องว่าง (Space) แทนคอมมา
        const searchWords = searchInput.split(/\s+/)
            .filter(w => w.length > 0);

        if (searchWords.length === 0) {
            backdrop.innerHTML = escapeHTML(text);
            return;
        }

        let highlightedText = escapeHTML(text);

        // Escape สัญลักษณ์พิเศษของ Regex
        const escapedWords = searchWords.map(w => w.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&'));
        const regex = new RegExp(`(${escapedWords.join('|')})`, 'gi');

        // ไฮไลต์คำที่แมตช์
        highlightedText = highlightedText.replace(regex, '<mark>$1</mark>');
        
        backdrop.innerHTML = highlightedText;
    }

    function escapeHTML(str) {
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    // ซิงค์ Scroll
    textInput.addEventListener('scroll', () => {
        backdrop.scrollTop = textInput.scrollTop;
        backdrop.scrollLeft = textInput.scrollLeft;
    });

    textInput.addEventListener('input', processText);
    searchWordInput.addEventListener('input', processText);

    // Toggle Sidebar
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        sidebar.classList.toggle('closed');
    }
</script>

</div>
</div>
</body>
</html>
